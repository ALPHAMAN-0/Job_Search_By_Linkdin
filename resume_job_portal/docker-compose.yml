services:
  mongodb:
    image: mongo:7
    container_name: job-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: jobportal
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: